services:
  haproxy:
    image: haproxy:3.3-alpine
    container_name: haproxy
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "80:80"
      - "8404:8404"  # Stats-UI + Prometheus-Metrics
    networks:
      - monitoring
    restart: unless-stopped
    # Damit HAProxy lokale Hostnamen auflösen kann (gmk.lan, fritz.box etc.),
    # muss der Docker-Host diese Namen über DNS kennen.
    # Falls nötig, hier eigene DNS-Server oder extra_hosts eintragen:
    # dns:
    #   - 192.168.1.1
    # extra_hosts:
    #   - "git.gmk.lan:192.168.x.x"
    #   - "gmk.lan:192.168.x.x"
    #   - "prometheus.gmk.lan:192.168.x.x"
    #   - "gmk.fritz.box:192.168.x.x"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - monitoring
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/haproxy.json
    networks:
      - monitoring
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:

networks:
  monitoring:
    driver: bridge
