global
    log stdout format raw local0 info
    maxconn 4096

defaults
    log global
    mode http
    option httplog
    option dontlognull
    option forwardfor
    option http-server-close
    timeout connect 5s
    timeout client 30s
    timeout server 30s
    retries 3

#---------------------------------------------------------------------
# Stats-UI & Prometheus-Metrics Endpoint
#---------------------------------------------------------------------
frontend stats
    bind *:8404
    http-request use-service prometheus-exporter if { path /metrics }
    stats enable
    stats uri /stats
    stats refresh 10s
    stats show-node
    stats show-legends
    no log

#---------------------------------------------------------------------
# HTTP-Frontend – Routing per Host-Header
#---------------------------------------------------------------------
frontend http_in
    bind *:8080

    default_backend gitea_backend

#---------------------------------------------------------------------
# Backends
#---------------------------------------------------------------------
backend gitea_backend
    description "Gitea (nginx:80)"
    option httpchk
    http-check send meth GET uri /
    http-check expect rstatus 2[0-9][0-9]|3[0-9][0-9]
    server gitea1 nginx:80 check inter 10s fall 3 rise 2
    server gitea2 nginx:80 check inter 10s fall 3 rise 2
    server gitea3 nginx:80 check inter 10s fall 3 rise 2

