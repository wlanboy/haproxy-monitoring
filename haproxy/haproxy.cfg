global
    log stdout format raw local0 info
    maxconn 4096

defaults
    log global
    mode http
    option httplog
    option dontlognull
    option forwardfor
    option http-server-close
    timeout connect 5s
    timeout client 30s
    timeout server 30s
    retries 3

#---------------------------------------------------------------------
# Stats-UI & Prometheus-Metrics Endpoint
#---------------------------------------------------------------------
frontend stats
    bind *:8404
    http-request use-service prometheus-exporter if { path /metrics }
    stats enable
    stats uri /stats
    stats refresh 10s
    stats show-node
    stats show-legends
    no log

#---------------------------------------------------------------------
# HTTP-Frontend – Routing per Host-Header
#---------------------------------------------------------------------
frontend http_in
    bind *:80

    acl host_gitea    hdr(host) -i git.gmk.lan
    acl host_gmk8090  hdr(host) -i gmk.lan:8090
    acl host_prom     hdr(host) -i prometheus.gmk.lan
    acl host_gmk9443  hdr(host) -i gmk.lan:9443
    acl host_fritzbox hdr(host) -i gmk.fritz.box

    use_backend gitea_backend    if host_gitea
    use_backend gmk8090_backend  if host_gmk8090
    use_backend prom_backend     if host_prom
    use_backend gmk9443_backend  if host_gmk9443
    use_backend fritzbox_backend if host_fritzbox

    default_backend gitea_backend

#---------------------------------------------------------------------
# Backends
#---------------------------------------------------------------------
backend gitea_backend
    description "Gitea (git.gmk.lan:3300)"
    option httpchk
    http-check send meth GET uri /
    http-check expect rstatus 2[0-9][0-9]|3[0-9][0-9]
    server gitea1 git.gmk.lan:3300 check ssl verify none inter 10s fall 3 rise 2
    server gitea2 git.gmk.lan:3300 check ssl verify none inter 10s fall 3 rise 2
    server gitea3 git.gmk.lan:3300 check ssl verify none inter 10s fall 3 rise 2

